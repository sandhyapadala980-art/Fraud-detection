services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./fraud.db
      MODEL_PATH: /app/artifacts/fraud_model.joblib
      DATASET_PATH: /app/data/sample_transactions.csv
      ALLOWED_ORIGINS: http://localhost:5173
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
